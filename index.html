// ─── SVG 렌더링 ───────────────────────────────────────────────
function buildSVG(fx) {
  const PAD = 18, GAP = 12, USABLE = 660, TOTAL_W = 680;

  function rowZoneW(row) {
    const nonNull = row.filter(z=>z!==null);
    const totalSpan = nonNull.reduce((s,z)=>(s+(z.span||1)),0);
    return (USABLE - (totalSpan-1)*GAP - PAD*2) / totalSpan;
  }
  function zoneH(zone) { if(!zone) return 0; return 50 + zone.items.length * 44; }
  function rowH(row) { return Math.max(...row.map(z=>zoneH(z))); }

  const rows = fx.rows;
  const rHeights = rows.map(rowH);
  const y_first = 70, ROW_GAP = 14;
  let yPositions = [], y = y_first;
  rHeights.forEach(h => { yPositions.push(y); y += h + ROW_GAP; });

  const guideY = y + 6, guideH = fx.guide ? 72 : 0;
  const outerBottom = guideY + guideH + 10;
  const SVG_H = outerBottom + 14;
  let s = '';

  s += `<rect width="${TOTAL_W}" height="${SVG_H}" fill="white" rx="10"/>`;
  s += `<text font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="15" font-weight="700" x="${TOTAL_W/2}" y="22" text-anchor="middle" fill="#1a1a18">${fx.name}</text>`;
  s += `<text font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="11" x="${TOTAL_W/2}" y="38" text-anchor="middle" fill="#888">${fx.sub}</text>`;
  s += `<rect x="10" y="46" width="660" height="${outerBottom-46}" rx="10" fill="none" stroke="#bbb" stroke-width="1.5"/>`;

  rows.forEach((row, rowIdx) => {
    const ry = yPositions[rowIdx];
    const unitW = rowZoneW(row);
    if(rowIdx === 0) s += `<text font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="11" x="${TOTAL_W/2}" y="62" text-anchor="middle" fill="#aaa">▲ 앞면 — 방문객 주동선</text>`;

    let cx = PAD;
    row.forEach((zone) => {
      if(!zone) { cx += unitW + GAP; return; }
      const span = zone.span||1;
      const zw = unitW*span + GAP*(span-1);
      const zh = zoneH(zone);
      const C = COLORS[zone.col]||COLORS.gray;
      const midX = cx + zw/2;

      s += `<rect x="${cx}" y="${ry}" width="${zw}" height="${zh}" rx="8" fill="${C.bg}" stroke="${C.bd}" stroke-width="0.8"/>`;
      const bw=56, bh=18;
      s += `<rect x="${cx+8}" y="${ry+8}" width="${bw}" height="${bh}" rx="4" fill="${C.bd}"/>`;
      s += `<text font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="10" font-weight="700" x="${cx+8+bw/2}" y="${ry+20}" text-anchor="middle" fill="white">${zone.label}</text>`;
      s += `<text font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="11" font-weight="600" x="${midX}" y="${ry+36}" text-anchor="middle" fill="${C.th}">${zone.sub}</text>`;

      zone.items.forEach((item, i) => {
        const iy = ry+46+i*44, ix = cx+8, iw = zw-16;
        s += `<rect x="${ix}" y="${iy}" width="${iw}" height="38" rx="5" fill="rgba(255,255,255,0.65)" stroke="${C.bd}" stroke-width="0.5"/>`;
        s += `<text font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="11" font-weight="600" x="${ix+iw/2}" y="${iy+13}" text-anchor="middle" fill="${C.th}">${item.t}</text>`;
        s += `<text font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="10" x="${ix+iw/2}" y="${iy+27}" text-anchor="middle" fill="${C.ts}">${item.d}</text>`;
      });
      cx += zw + GAP;
    });
  });

  if(fx.guide) {
    s += `<rect x="20" y="${guideY}" width="640" height="${guideH-4}" rx="8" fill="none" stroke="#ddd" stroke-width="0.5" stroke-dasharray="5 3"/>`;
    s += `<text font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="10" font-weight="700" x="${TOTAL_W/2}" y="${guideY+16}" text-anchor="middle" fill="#aaa">배치 가이드</text>`;
    s += `<text font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="11" x="${TOTAL_W/2}" y="${guideY+34}" text-anchor="middle" fill="#888">${fx.guide}</text>`;
    s += `<text font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="10" x="648" y="${outerBottom+8}" text-anchor="end" fill="#bbb">1,600 × 900 mm · 아일랜드 평대</text>`;
  }
  return `<svg class="diagram" viewBox="0 0 ${TOTAL_W} ${SVG_H}" xmlns="http://www.w3.org/2000/svg">${s}</svg>`;
}

// ─── 탭 + 콘텐츠 ─────────────────────────────────────────────
const tabsEl = document.getElementById('tabs');
const sectsEl = document.getElementById('sects');

BRANDS.forEach((brand, bi) => {
  const btn = document.createElement('button');
  btn.className = 'tab'+(bi===0?' on':'');
  btn.textContent = brand.label;
  btn.onclick = () => {
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
    document.querySelectorAll('.sect').forEach(s=>s.classList.remove('on'));
    btn.classList.add('on');
    document.getElementById('sect-'+brand.id).classList.add('on');
  };
  tabsEl.appendChild(btn);

  const sect = document.createElement('div');
  sect.className = 'sect'+(bi===0?' on':'');
  sect.id = 'sect-'+brand.id;
  let html = `<div class="brand-info">${brand.info}</div>`;
  brand.fixtures.forEach((fx, fi) => {
    html += `<div class="fx-wrap">
      <div class="fx-title">${fx.name}</div>
      ${buildSVG(fx)}
      <div class="fx-dl"><button class="dl-btn" onclick="dlSVG('${brand.id}-${fi}')">SVG 저장</button></div>
    </div>`;
  });
  sect.innerHTML = html;
  sectsEl.appendChild(sect);
});

function dlSVG(id) {
  const parts = id.split('-');
  const fi = parseInt(parts[parts.length-1]);
  const brandId = parts.slice(0,parts.length-1).join('-');
  const sect = document.getElementById('sect-'+brandId);
  const svg = sect.querySelectorAll('svg.diagram')[fi];
  if(!svg) return;
  const blob = new Blob([new XMLSerializer().serializeToString(svg)], {type:'image/svg+xml'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `배치도_${id}.svg`;
  a.click();
}
