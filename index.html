function renderBrands() {
  let html = '';
  BRANDS_DATA.forEach((b, idx) => {
    const rank = idx + 1;
    const rankClass = rank <= 3 ? 'gold' : '';
    const aov = b.total_qty > 0 ? Math.round(b.total_rev / b.total_qty) : 0;
    
    // BEST 5 SKU
    let bestHtml = '';
    if (b.best.length === 0) {
      bestHtml = '<div class="empty-msg">데이터 없음</div>';
    } else {
      bestHtml = b.best.map((s, i) => {
        const rkClass = i < 3 ? 'gold' : '';
        return '<div class="sku-item">' +
          '<div class="sku-rank ' + rkClass + '">' + (i+1) + '</div>' +
          '<div class="sku-name" title="' + s.name + '">' + s.name + '</div>' +
          '<div><span class="sku-qty best">' + s.qty + '개</span></div>' +
          '<div class="sku-rev">' + fmtKR(s.rev) + '원</div>' +
          '</div>';
      }).join('');
    }
    
    // OUT 후보
    let outHtml = '';
    if (b.out.length === 0) {
      outHtml = '<div class="empty-msg">OUT 후보 없음 (모든 SKU 회전 양호)</div>';
    } else {
      outHtml = b.out.map(s => {
        let qtyClass = 'out-3';
        if (s.qty === 1) qtyClass = 'out-1';
        else if (s.qty === 2) qtyClass = 'out-2';
        return '<div class="sku-item">' +
          '<div class="sku-rank">·</div>' +
          '<div class="sku-name" title="' + s.name + '">' + s.name + '</div>' +
          '<div><span class="sku-qty ' + qtyClass + '">' + s.qty + '개</span></div>' +
          '<div class="sku-rev muted">' + s.price.toLocaleString() + '원</div>' +
          '</div>';
      }).join('');
    }
    
    const outScrollClass = b.out.length > 10 ? 'scroll-h' : '';
    
    html += '<div class="brand-section" style="border-left-color: ' + b.color + ';">' +
      '<div class="brand-header">' +
        '<div class="brand-title">' +
          '<div class="brand-rank ' + rankClass + '">' + rank + '</div>' +
          '<div class="brand-name" style="color: ' + b.color + ';">' + b.op + '</div>' +
        '</div>' +
        '<div class="brand-meta">' +
          '매출 <strong>' + fmtKR(b.total_rev) + '원</strong> · ' +
          '수량 ' + b.total_qty.toLocaleString() + '개 · ' +
          'SKU ' + b.total_sku + '종 · ' +
          '객단가 ' + fmtKR(aov) + '원' +
        '</div>' +
      '</div>' +
      '<div class="columns">' +
        '<div>' +
          '<div class="col-title best">⭐ BEST 5 SKU <small>5월 판교 우선 발주</small></div>' +
          '<div class="sku-list">' + bestHtml + '</div>' +
        '</div>' +
        '<div>' +
          '<div class="col-title out">⚠️ OUT 후보 (' + b.out.length + '종) <small>5월 판교 OUT/축소 검토</small></div>' +
          '<div class="sku-list ' + outScrollClass + '">' + outHtml + '</div>' +
        '</div>' +
      '</div>' +
    '</div>';
  });
  document.getElementById('brandsContainer').innerHTML = html;
}

renderBrands();
</script>
